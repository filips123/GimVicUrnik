name: Check Frontend

on:
  push:
    paths:
      - .github/workflows/website.yaml
      - website/**
    branches:
      - main
  pull_request:
    paths:
      - .github/workflows/website.yaml
      - website/**

defaults:
  run:
    working-directory: website
    shell: bash

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enable Corepack
        run: corepack enable

      - name: Configure Yarn cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/yarn
            ~/.yarn/berry/cache
            ./node_modules/.cache
            ./node_modules/.vite
          key: ${{ runner.os }}-yarn-lint-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-lint-

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Copy configuration
        run: cp .env.sample .env

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint the project with ESLint
        if: always()
        run: yarn lint

      - name: Lint the project with Prettier
        if: always()
        run: yarn format

  typecheck:
    name: Typechecking
    runs-on: ubuntu-latest

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enable Corepack
        run: corepack enable

      - name: Configure Yarn cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/yarn
            ~/.yarn/berry/cache
            ./node_modules/.cache
            ./node_modules/.vite
          key: ${{ runner.os }}-yarn-typecheck-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-typecheck-

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Copy configuration
        run: cp .env.sample .env

      - name: Install dependencies
        run: yarn install --immutable

      - name: Typecheck the project
        run: yarn typecheck

  build:
    name: Building
    runs-on: ubuntu-latest

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Enable Corepack
        run: corepack enable

      - name: Configure Yarn cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/yarn
            ~/.yarn/berry/cache
            ./node_modules/.cache
            ./node_modules/.vite
          key: ${{ runner.os }}-yarn-build-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}-yarn-build-

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Copy configuration
        run: cp .env.sample .env

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build the project
        run: yarn build
