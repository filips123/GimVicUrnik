name: Check Backend

on:
  push:
    paths:
      - .github/workflows/api.yaml
      - API/**
    branches:
      - main
  pull_request:
    paths:
      - .github/workflows/api.yaml
      - API/**

defaults:
  run:
    working-directory: API
    shell: bash

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure Poetry cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pypoetry
            ~/.local/share/pypoetry
            ~/.local/bin/poetry
            ./.ruff_cache
          key: ${{ runner.os }}-poetry-lint-${{ hashFiles('**/poetry.lock') }}
          restore-keys: ${{ runner.os }}-poetry-lint-

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python -
          ~/.local/bin/poetry config virtualenvs.create false
          echo "~/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --extras sentry

      - name: Lint the project with ruff check
        if: always()
        run: ruff check --output-format=github

      - name: Lint the project with ruff format
        if: always()
        run: ruff format --check

  typecheck:
    name: Typechecking
    runs-on: ubuntu-latest

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure Poetry cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cache/pip
            ~/.cache/pypoetry
            ~/.local/share/pypoetry
            ~/.local/bin/poetry
            ./.mypy_cache
          key: ${{ runner.os }}-poetry-typecheck-${{ hashFiles('**/poetry.lock') }}
          restore-keys: ${{ runner.os }}-poetry-typecheck-

      - name: Install Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python -
          ~/.local/bin/poetry config virtualenvs.create false
          echo "~/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --extras sentry

      - name: Typecheck the project
        run: mypy gimvicurnik
